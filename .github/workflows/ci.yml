name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check schema manifest
        run: python tools/sync_schemas.py --check

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Build SDK
        run: dotnet build dotnet/src/Heddle.Sdk/Heddle.Sdk.csproj --configuration Release
      - name: Test SDK
        run: dotnet test dotnet/tests/Heddle.Sdk.Tests/Heddle.Sdk.Tests.csproj --configuration Release
      - name: Build NATS adapter
        run: dotnet build dotnet/src/Heddle.Sdk.Nats/Heddle.Sdk.Nats.csproj --configuration Release
      - name: Build examples
        run: dotnet build examples/dotnet/EchoWorker/EchoWorker.csproj --configuration Release
      - name: Pack NuGet packages
        run: |
          dotnet pack dotnet/src/Heddle.Sdk/Heddle.Sdk.csproj --configuration Release --no-build --output artifacts/nuget
          dotnet pack dotnet/src/Heddle.Sdk.Nats/Heddle.Sdk.Nats.csproj --configuration Release --no-build --output artifacts/nuget
      - name: Upload NuGet package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg

  swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Inspect root Swift package
        run: swift package dump-package
      - name: Build root Swift package surface
        run: swift build
      - name: Test SDK
        run: swift test --package-path swift
      - name: Build NATS adapter package surface
        run: swift build --package-path swift-nats
      - name: Build examples
        run: swift build --package-path examples/swift/echo-worker

  swift-nats-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build NATS adapter
        run: swift build --package-path swift-nats

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt
      - name: Build docs
        run: mkdocs build --strict
